<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>站台已搬家 - gyoza-course-notes</title>
  <link rel="canonical" href="https://gyozalab.github.io/gyoza-course-notes/cybersecurity/MOC">
  <meta http-equiv="refresh" content="3;url=https://gyozalab.github.io/gyoza-course-notes/">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Source Sans Pro", sans-serif;
      max-width: 640px;
      margin: 80px auto;
      padding: 0 20px;
      color: #2b2b2b;
      line-height: 1.7;
    }
    h1 { font-size: 28px; margin-bottom: 8px; }
    .lead { color: #4e4e4e; margin-top: 0; }
    a { color: #284b63; }
    .countdown { color: #84a59d; font-size: 14px; }
    .new-url {
      background: #faf8f8;
      border-left: 4px solid #84a59d;
      padding: 12px 16px;
      margin: 24px 0;
      border-radius: 4px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>站台已搬家</h1>
  <p class="lead">這是舊版 <code>google-cybersecurity-notes</code> 站台的連結。現在的正式站名是 <strong>gyoza-course-notes</strong>，我會把你轉到新版站台的對應位置。</p>

  <div class="new-url">
    <strong>新網址</strong><br>
    <a id="target-link" href="https://gyozalab.github.io/gyoza-course-notes/">https://gyozalab.github.io/gyoza-course-notes/</a>
  </div>

  <p class="countdown" id="countdown">3 秒後自動跳轉...</p>

  <p>如果沒有自動跳轉，<a id="manual-link" href="https://gyozalab.github.io/gyoza-course-notes/">點這裡手動前往新站</a>。</p>

  <hr style="margin-top: 40px; border: none; border-top: 1px solid #e5e5e5;">
  <p style="font-size: 13px; color: #b8b8b8;">gyozalab - <a href="https://gyozalab.com/">gyozalab.com</a></p>

  <script>
    (function () {
      var newBase = 'https://gyozalab.github.io/gyoza-course-notes/';
      var path = window.location.pathname || '/';
      path = path.replace(/^\/google-cybersecurity-notes\/?/, '');
      // Normalize old Quartz-style .html suffixes.
      path = path.replace(/\.html$/, '');
      var target;
      if (path === '' || path === '/') {
        target = newBase + 'cybersecurity/MOC';
      } else if (/^C\d_/.test(path) || path === 'MOC') {
        target = newBase + 'cybersecurity/' + path;
      } else {
        target = newBase + path;
      }
      var search = window.location.search || '';
      var hash = window.location.hash || '';
      var finalUrl = target + search + hash;
      document.getElementById('target-link').href = finalUrl;
      document.getElementById('target-link').textContent = finalUrl;
      document.getElementById('manual-link').href = finalUrl;

      var seconds = 3;
      var counter = document.getElementById('countdown');
      var timer = setInterval(function () {
        seconds--;
        if (seconds > 0) {
          counter.textContent = seconds + ' 秒後自動跳轉...';
        } else {
          clearInterval(timer);
          window.location.replace(finalUrl);
        }
      }, 1000);
    })();
  </script>
</body>
</html>
